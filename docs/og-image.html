<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 1200px;
            height: 630px;
            background: linear-gradient(135deg, #0a0a0a 0%, #111111 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: white;
            position: relative;
            overflow: hidden;
        }
        
        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        
        .content {
            text-align: center;
            z-index: 2;
        }
        
        .logo {
            font-size: 120px;
            font-weight: 900;
            letter-spacing: 0.1em;
            color: #4CAF50;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        
        .tagline {
            font-size: 36px;
            font-weight: 600;
            margin-bottom: 20px;
            color: white;
        }
        
        .subtitle {
            font-size: 24px;
            color: #999999;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .signal-icon {
            position: absolute;
            top: 50px;
            right: 80px;
            color: #4CAF50;
            opacity: 0.3;
            font-size: 120px;
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="signal-icon">📶</div>
    <div class="content">
        <div class="logo">GYMSIGNAL</div>
        <div class="tagline">we watch the algorithm so you don't have to</div>
        <div class="subtitle">AI-powered trend intelligence for fitness creators</div>
    </div>
</body>
</html>
